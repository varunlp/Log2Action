services:
  db:
    image: pgvector/pgvector:pg15
    container_name: log2action_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-log2action_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secretpassword}
      POSTGRES_DB: ${POSTGRES_DB:-log2action_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-log2action_user} -d ${POSTGRES_DB:-log2action_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    container_name: log2action_api
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - PORT=8000
      - POSTGRES_USER=${POSTGRES_USER:-log2action_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secretpassword}
      - POSTGRES_DB=${POSTGRES_DB:-log2action_db}
      - POSTGRES_SERVER=db
      - AI_PROVIDER=${AI_PROVIDER:-mock}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-super_secret_log2action_jwt_key_change_in_prod}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost,http://localhost:5173,http://localhost:8000}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - BOOTSTRAP_ADMIN_EMAIL=${BOOTSTRAP_ADMIN_EMAIL:-}
      - BOOTSTRAP_ADMIN_PASSWORD=${BOOTSTRAP_ADMIN_PASSWORD:-}
      - ENABLE_DEV_ADMIN=${ENABLE_DEV_ADMIN:-true}
      - DEV_ADMIN_EMAIL=${DEV_ADMIN_EMAIL:-admin@log2action.local}
      - DEV_ADMIN_PASSWORD=${DEV_ADMIN_PASSWORD:-AdminPass1234}
      - FIRST_USER_AUTO_ADMIN=${FIRST_USER_AUTO_ADMIN:-true}
      - MAX_UPLOAD_BYTES=${MAX_UPLOAD_BYTES:-10485760}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: log2action_frontend
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
