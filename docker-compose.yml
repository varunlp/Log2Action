services:
  db:
    image: pgvector/pgvector:pg15
    container_name: log2action_db
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-log2action_user}
      POSTGRES_DB: ${POSTGRES_DB:-log2action_db}
      # Removed hardcoded password fallback
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-log2action_user} -d ${POSTGRES_DB:-log2action_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    container_name: log2action_api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - POSTGRES_SERVER=db
      - PORT=8000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: log2action_frontend
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
